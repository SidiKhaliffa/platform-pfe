# Pipeline CI de la plateforme — build + test de tous les services + frontend
# Version simple : tous les jobs tournent à chaque push.
# On réintroduira l'optimisation "rules: changes:" plus tard, quand elle aura du sens.

stages:
  - install
  - test

default:
  image: node:20

# ---- SANITY CHECK (vérifie que la pipeline se déclenche) ----
sanity-check:
  stage: install
  script:
    - echo "Pipeline déclenchée avec succès !"
    - node --version

# =========================================================
#  BACKEND — services sous platform/services/
# =========================================================

# ---- API GATEWAY ----
install:gateway:
  stage: install
  script:
    - cd platform/services/api-gateway
    - npm ci

test:gateway:
  stage: test
  script:
    - cd platform/services/api-gateway
    - npm ci
    - npm test --if-present

# ---- AUTH SERVICE ----
install:auth:
  stage: install
  script:
    - cd platform/services/auth-service
    - npm ci

test:auth:
  stage: test
  script:
    - cd platform/services/auth-service
    - npm ci
    - npm test --if-present

# ---- INVENTORY SERVICE ----
install:inventory:
  stage: install
  script:
    - cd platform/services/inventory-service
    - npm ci

test:inventory:
  stage: test
  script:
    - cd platform/services/inventory-service
    - npm ci
    - npm test --if-present

# ---- MONITORING SERVICE ----
install:monitoring:
  stage: install
  script:
    - cd platform/services/monitoring-service
    - npm ci

test:monitoring:
  stage: test
  script:
    - cd platform/services/monitoring-service
    - npm ci
    - npm test --if-present

# ---- EXECUTION SERVICE ----
install:execution:
  stage: install
  script:
    - cd platform/services/execution-service
    - npm ci

test:execution:
  stage: test
  script:
    - cd platform/services/execution-service
    - npm ci
    - npm test --if-present

# =========================================================
#  FRONTEND — React (Vite) sous frontend/
# =========================================================

install:frontend:
  stage: install
  script:
    - cd frontend
    - npm ci

build:frontend:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm run build