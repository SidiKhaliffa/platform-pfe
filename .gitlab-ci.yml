# Pipeline CI de la plateforme — build + test de tous les services + frontend
# Étape d'apprentissage : on garde simple, on enrichit ensuite.

stages:
  - install
  - test

default:
  image: node:20

# =========================================================
#  BACKEND — services sous platform/services/
# =========================================================

# ---- API GATEWAY ----
install:gateway:
  stage: install
  rules:
    - changes: [ "platform/services/api-gateway/**/*" ]
  script:
    - cd platform/services/api-gateway
    - npm ci

test:gateway:
  stage: test
  rules:
    - changes: [ "platform/services/api-gateway/**/*" ]
  script:
    - cd platform/services/api-gateway
    - npm ci
    - npm test --if-present

# ---- AUTH SERVICE ----
install:auth:
  stage: install
  rules:
    - changes: [ "platform/services/auth-service/**/*" ]
  script:
    - cd platform/services/auth-service
    - npm ci

test:auth:
  stage: test
  rules:
    - changes: [ "platform/services/auth-service/**/*" ]
  script:
    - cd platform/services/auth-service
