spec:
  inputs:
    rollback_tag:
      description: "Tag d'image à redéployer pour un rollback (laisser EXACTEMENT 'none' pour un pipeline normal)"
      default: "none"
      type: string
---
# =========================================================
#  Pipeline CI/CD — Plateforme intelligente de gestion de serveurs
#  4 stages : install/test (CI) → build → publish → deploy (CD)
#
#  install / test / build / publish  → runners partagés GitLab.com
#  deploy / rollback                 → runner skhaliff (ta machine, WSL)
# =========================================================

stages:
  - install
  - test
  - build
  - publish
  - deploy

default:
  image: node:20

variables:
  ROLLBACK_TAG: $[[ inputs.rollback_tag ]]
  GATEWAY_PATH: platform/services/api-gateway
  AUTH_PATH: platform/services/auth-service
  INVENTORY_PATH: platform/services/inventory-service
  MONITORING_PATH: platform/services/monitoring-service
  EXECUTION_PATH: platform/services/execution-service
  FRONTEND_PATH: frontend
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2

# Cache npm par service
.node_cache: &node_cache
  cache:
    key:
      files:
        - $SERVICE_PATH/package-lock.json
    paths:
      - $SERVICE_PATH/node_modules
    policy: pull-push

# ---------------------------------------------------------
#  Templates install / test
# ---------------------------------------------------------
.install_template:
  stage: install
  <<: *node_cache
  rules:
    - if: '"$[[ inputs.rollback_tag ]]" != "none"'
      when: never
    - when: on_success
  script:
    - cd $SERVICE_PATH
    - npm ci

.test_template:
  stage: test
  <<: *node_cache
  rules:
    - if: '"$[[ inputs.rollback_tag ]]" != "none"'
      when: never
    - when: on_success
  script:
    - cd $SERVICE_PATH
    - npm ci
    - npm test --if-present

# ---------------------------------------------------------
#  Template build — construit l'image Docker (runners GitLab.com,
#  via Docker-in-Docker), exportée en artifact .tar
# ---------------------------------------------------------
.docker_build_template:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    IMAGE_TAG: "$CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA"
  script:
    - docker build -t $IMAGE_TAG $SERVICE_PATH
    - docker save $IMAGE_TAG -o $SERVICE_NAME.tar
  artifacts:
    paths:
      - $SERVICE_NAME.tar
    expire_in: 1 hour
  rules:
    - if: '"$[[ inputs.rollback_tag ]]" != "none"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'

# ---------------------------------------------------------
#  Template publish — pousse l'image vers le registre GitLab
# ---------------------------------------------------------
.docker_publish_template:
  stage: publish
  image: docker:24
  services:
    - docker:24-dind
  variables:
    IMAGE_TAG: "$CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA"
  before_script:
    - docker load -i $SERVICE_NAME.tar
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker push $IMAGE_TAG
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag $IMAGE_TAG $CI_REGISTRY_IMAGE/$SERVICE_NAME:latest
        docker push $CI_REGISTRY_IMAGE/$SERVICE_NAME:latest
      fi
  rules:
    - if: '"$[[ inputs.rollback_tag ]]" != "none"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'

# =========================================================
#  BACKEND — API Gateway
# =========================================================
install:gateway:
  extends: .install_template
  variables: { SERVICE_PATH: $GATEWAY_PATH }

test:gateway:
  extends: .test_template
  variables: { SERVICE_PATH: $GATEWAY_PATH }
  needs: ["install:gateway"]

build:gateway:
  extends: .docker_build_template
  variables: { SERVICE_PATH: $GATEWAY_PATH, SERVICE_NAME: api-gateway }
  needs: ["test:gateway"]

publish:gateway:
  extends: .docker_publish_template
  variables: { SERVICE_NAME: api-gateway }
  needs: ["build:gateway"]

# ---- AUTH SERVICE ----
install:auth:
  extends: .install_template
  variables: { SERVICE_PATH: $AUTH_PATH }

test:auth:
  extends: .test_template
  variables: { SERVICE_PATH: $AUTH_PATH }
  needs: ["install:auth"]

build:auth:
  extends: .docker_build_template
  variables: { SERVICE_PATH: $AUTH_PATH, SERVICE_NAME: auth-service }
  needs: ["test:auth"]

publish:auth:
  extends: .docker_publish_template
  variables: { SERVICE_NAME: auth-service }
  needs: ["build:auth"]

# ---- INVENTORY SERVICE ----
install:inventory:
  extends: .install_template
  variables: { SERVICE_PATH: $INVENTORY_PATH }

test:inventory:
  extends: .test_template
  variables: { SERVICE_PATH: $INVENTORY_PATH }
  needs: ["install:inventory"]

build:inventory:
  extends: .docker_build_template
  variables: { SERVICE_PATH: $INVENTORY_PATH, SERVICE_NAME: inventory-service }
  needs: ["test:inventory"]

publish:inventory:
  extends: .docker_publish_template
  variables: { SERVICE_NAME: inventory-service }
  needs: ["build:inventory"]

# ---- MONITORING SERVICE ----
install:monitoring:
  extends: .install_template
  variables: { SERVICE_PATH: $MONITORING_PATH }

test:monitoring:
  extends: .test_template
  variables: { SERVICE_PATH: $MONITORING_PATH }
  needs: ["install:monitoring"]

build:monitoring:
  extends: .docker_build_template
  variables: { SERVICE_PATH: $MONITORING_PATH, SERVICE_NAME: monitoring-service }
  needs: ["test:monitoring"]

publish:monitoring:
  extends: .docker_publish_template
  variables: { SERVICE_NAME: monitoring-service }
  needs: ["build:monitoring"]

# ---- EXECUTION SERVICE ----
install:execution:
  extends: .install_template
  variables: { SERVICE_PATH: $EXECUTION_PATH }

test:execution:
  extends: .test_template
  variables: { SERVICE_PATH: $EXECUTION_PATH }
  needs: ["install:execution"]

build:execution:
  extends: .docker_build_template
  variables: { SERVICE_PATH: $EXECUTION_PATH, SERVICE_NAME: execution-service }
  needs: ["test:execution"]

publish:execution:
  extends: .docker_publish_template
  variables: { SERVICE_NAME: execution-service }
  needs: ["build:execution"]

# =========================================================
#  FRONTEND — React (Vite)
# =========================================================
install:frontend:
  extends: .install_template
  variables: { SERVICE_PATH: $FRONTEND_PATH }

test:frontend:
  stage: test
  variables: { SERVICE_PATH: $FRONTEND_PATH }
  needs: ["install:frontend"]
  rules:
    - if: '"$[[ inputs.rollback_tag ]]" != "none"'
      when: never
    - when: on_success
  script:
    - cd $SERVICE_PATH
    - npm ci
    - npm run build

build:frontend:
  extends: .docker_build_template
  variables: { SERVICE_PATH: $FRONTEND_PATH, SERVICE_NAME: frontend }
  needs: ["test:frontend"]

publish:frontend:
  extends: .docker_publish_template
  variables: { SERVICE_NAME: frontend }
  needs: ["build:frontend"]

# =========================================================
#  STAGE deploy — exécution LOCALE sur ton runner skhaliff
#  (WSL Ubuntu + Docker Desktop). Pas de SSH : le runner tourne
#  déjà sur la machine cible, donc "déployer" = pull + up ici.
#
#  Pré-requis à faire UNE FOIS dans ton terminal Ubuntu (WSL) :
#    docker login registry.gitlab.com   (avec un Deploy Token,
#    Settings > Repository > Deploy tokens, scope read_registry)
#
#  Adapte APP_DIR ci-dessous au chemin réel de ton
#  docker-compose.yml dans le système de fichiers WSL,
#  ex: /home/<user>/app  ou  /mnt/c/Users/ELECTRO FATAL/Desktop/pfe_app/platform
# =========================================================
deploy:production:
  stage: deploy
  tags:
    - skhaliff
  variables:
    APP_DIR: "/mnt/c/Users/ELECTRO FATAL/Desktop/pfe_app/platform"
  needs:
    - publish:gateway
    - publish:auth
    - publish:inventory
    - publish:monitoring
    - publish:execution
    - publish:frontend
  script:
    - cd "$APP_DIR"
    - sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$CI_COMMIT_SHORT_SHA/" .env
    - docker compose pull
    - docker compose up -d --remove-orphans
    - docker image prune -f
  environment:
    name: production
  rules:
    - if: '"$[[ inputs.rollback_tag ]]" != "none"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'

# ---------------------------------------------------------
#  Rollback manuel — redéploie un tag antérieur, localement.
#  Se lance à la main : CI/CD > Run pipeline > variable ROLLBACK_TAG
# ---------------------------------------------------------
rollback:production:
  stage: deploy
  tags:
    - skhaliff
  variables:
    APP_DIR: "/mnt/c/Users/ELECTRO FATAL/Desktop/pfe_app/platform"
  script:
    - cd "$APP_DIR"
    - sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$ROLLBACK_TAG/" .env
    - docker compose pull
    - docker compose up -d --remove-orphans
  environment:
    name: production
  rules:
    - if: '"$[[ inputs.rollback_tag ]]" != "none"'
      when: on_success
    - when: never

# =========================================================
#  STAGE .post — Diagnostic IA automatique sur échec de pipeline
#  (contribution principale du PFE : couche d'orchestration
#  intelligente, cf. rapport section 3.8)
#
#  Variable requise (Settings > CI/CD > Variables,
#  cochée "Protected" + "Masked") :
#    OPENROUTER_API_KEY : ta clé API OpenRouter (préfixe sk-or-v1-...)
#
#  Se déclenche automatiquement dès qu'un job précédent échoue
#  (test, build, publish ou deploy) — jamais lors d'un rollback.
# =========================================================
ai-diagnostic:
  stage: .post
  image: alpine:3.20
  rules:
    - if: '"$[[ inputs.rollback_tag ]]" != "none"'
      when: never
    - when: on_failure
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      echo "Recherche du job en échec dans ce pipeline..."

      FAILED_JOB=$(curl --silent --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/pipelines/$CI_PIPELINE_ID/jobs?scope[]=failed" \
        | jq '[.[] | select(.name != "ai-diagnostic")][0]')

      FAILED_JOB_ID=$(echo "$FAILED_JOB" | jq -r '.id')
      FAILED_JOB_NAME=$(echo "$FAILED_JOB" | jq -r '.name')

      if [ "$FAILED_JOB_ID" = "null" ] || [ -z "$FAILED_JOB_ID" ]; then
        echo "Aucun job en échec identifiable — arrêt."
        exit 0
      fi

      echo "Job en échec détecté : $FAILED_JOB_NAME (ID $FAILED_JOB_ID)"

      # Récupère les logs du job en échec (les 6000 derniers caractères suffisent
      # généralement à couvrir l'erreur réelle, en fin de log)
      LOGS=$(curl --silent --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/jobs/$FAILED_JOB_ID/trace" \
        | tail -c 6000)

      # Construit le prompt (rôle + données + format de réponse attendu)
      PAYLOAD=$(jq -n \
        --arg job "$FAILED_JOB_NAME" \
        --arg logs "$LOGS" \
        '{
          model: "openai/gpt-4o-mini",
          max_tokens: 600,
          messages: [{
            role: "user",
            content: ("Tu es un assistant DevOps spécialisé dans le diagnostic de pipelines CI/CD GitLab.\n\nLe job \"" + $job + "\" vient d'\''échouer. Voici les derniers logs :\n\n---\n" + $logs + "\n---\n\nRéponds STRICTEMENT dans ce format :\n1. Cause probable : (1-2 phrases)\n2. Correction suggérée : (étapes concrètes et actionnables)\n3. Niveau de gravité : (faible / moyen / critique)")
          }]
        }')

      echo "Envoi des logs à l'API OpenRouter pour diagnostic..."

      RESPONSE=$(curl --silent https://openrouter.ai/api/v1/chat/completions \
        --header "Authorization: Bearer $OPENROUTER_API_KEY" \
        --header "content-type: application/json" \
        --data "$PAYLOAD")

      DIAGNOSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Erreur : réponse API invalide — vérifie OPENROUTER_API_KEY.\n\nRéponse brute : \(.)"')

      echo ""
      echo "=================== DIAGNOSTIC IA ==================="
      echo "$DIAGNOSIS"
      echo "======================================================="

      echo "$DIAGNOSIS" > diagnostic.md
  artifacts:
    when: always
    paths:
      - diagnostic.md
    expire_in: 7 days