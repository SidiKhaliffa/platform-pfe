    - npm test --if-present

# =========================================================
#  FRONTEND — React (Vite) sous frontend/
# =========================================================

install:frontend:
  stage: install
  rules:
    - changes: [ "frontend/**/*" ]
  script:
    - cd frontend
    - npm ci

build:frontend:
  stage: test
  rules:
    - changes: [ "frontend/**/*" ]
  script:
    - cd frontend
    - npm ci
    - npm run build